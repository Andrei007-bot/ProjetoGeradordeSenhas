<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <input type="radio" name="gerador" id="senha-1" checked class="radio-senha">
    <input type="radio" name="gerador" id="senha-2" class="radio-senha">
    <input type="radio" name="gerador" id="senha-3" class="radio-senha">

    <main class="conteudo">
        <header class="conteudo-titulo">
            <img src="unlock.svg" alt="Ícone de um cadeado aberto">
            <h1 class="titulo-principal">Gerador de senhas</h1>
            <p class="titulo-secundario">Simulação visual de segurança avançada</p>
        </header>

        <section class="conteudo-senha">
            <label>Senha Gerada</label>
            <div class="wrapper-senha">
                <input type="text" class="input-senha s1" readonly value="p@$$w0rd_Frac0">
                <input type="text" class="input-senha s2" readonly value="K9#mZ!2@pL9q">
                <input type="text" class="input-senha s3" readonly value="X7$vB!9#mQ2@pL4_Zx">
            </div>
            
            <div class="botoes-gerar">
                <label for="senha-1" class="btn-gerar bg-1">Gerar Senha A</label>
                <label for="senha-2" class="btn-gerar bg-2">Gerar Senha B</label>
                <label for="senha-3" class="btn-gerar bg-3">Gerar Senha C</label>
            </div>
        </section>

        <section class="parametro">
            <h2 class="parametro-titulo">Personalize sua senha</h2>
            
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h3 class="parametro-senha__titulo">Número de caracteres</h3>
                    <div class="parametro-senha-range">
                        <input type="range" id="tamanho" min="8" max="18" value="12">
                    </div>
                </div>                
                
                <div class="parametro-senha container-opcoes">
                    <h3 class="parametro-senha__titulo">Características da senha</h3>
                    <div class="opcoes-caracteres">
                        <input type="checkbox" id="chk-maiusculas" class="chk-forca" checked>
                        <label for="chk-maiusculas">Letras Maiúsculas</label>

                        <input type="checkbox" id="chk-minusculas" class="chk-forca" checked>
                        <label for="chk-minusculas">Letras Minúsculas</label>

                        <input type="checkbox" id="chk-numeros" class="chk-forca">
                        <label for="chk-numeros">Números</label>

                        <input type="checkbox" id="chk-simbolos" class="chk-forca">
                        <label for="chk-simbolos">Símbolos</label>
                    </div>
                </div>

                <div class="parametro-senha">
                    <h3 class="parametro-senha__titulo">Força da senha</h3>
                    <div class="forca-container">
                        <div class="forca-blocos">
                            <span class="bloco bloco-1"></span>
                            <span class="bloco bloco-2"></span>
                            <span class="bloco bloco-3"></span>
                            <span class="bloco bloco-4"></span>
                        </div>
                        <p class="forca-texto">Fraca</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
